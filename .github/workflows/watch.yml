name: jersey-watcher

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
    inputs:
      silent_backfill:
        description: "Indexer sans envoyer d'alertes (re-scan élargi)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: jersey-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run watcher
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SILENT_BACKFILL: ${{ inputs.silent_backfill }}
        run: python watch.py
      - name: Persist data + page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json docs/index.html
          git commit -m "update catalogue [skip ci]" || echo "rien à committer"
          git push
